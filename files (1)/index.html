<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Happy Birthday, Angel 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- decorative starry / floating background -->
  <div class="night-sky" id="sky" aria-hidden="true"></div>
  <div class="balloons" id="balloons" aria-hidden="true"></div>
  <div class="bread-container" id="breadContainer" aria-hidden="true"></div>

  <main class="stage">

    <p class="eyebrow"> for Angel </p>

    <h1 class="headline">
      Happy Birthday,
      <span class="name">Angel</span>
    </h1>

    <section class="card" aria-label="Kartu ulang tahun animasi">

      <div class="cake-scene" id="cakeScene">
        <div class="candle" id="candle">
          <div class="flame" id="flame">
            <span class="flame-glow"></span>
          </div>
          <div class="wick"></div>
        </div>

        <div class="frosting-top">
          <span class="drip drip-1"></span>
          <span class="drip drip-2"></span>
          <span class="drip drip-3"></span>
          <span class="drip drip-4"></span>
          <span class="drip drip-5"></span>
        </div>

        <div class="layer layer-3"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-1"></div>
        <div class="plate"></div>
        <div class="crumbs" aria-hidden="true"></div>
      </div>

      <p class="hint" id="hint">tiup lilinnya, buat satu permintaan </p>

      <button class="blow-btn" id="blowBtn" type="button">
        Tiup Lilin&nbsp;
      </button>

      <section class="message-card" id="messageCard" hidden>
        <p class="message-text" id="messageText"></p>
        <p class="signature">— Sincerely, Iyan </p>
        <button class="again-btn" id="againBtn" type="button">Nyalain lagi </button>
      </section>

    </section>

    <p class="footnote">dibuat untuk Angel dari gweee :p</p>

  </main>

  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

<script src="script.js"></script>
</body>
</html>
